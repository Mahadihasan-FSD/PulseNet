[build]
  publish = "."               # root folder publish হবে  

[[redirects]]
  from = "/*"
  to = "/index.html"          # SPA route সব path index.html এ redirect
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"  # static files caching

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"  # index.html always fresh